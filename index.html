<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Progression Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f8f8f6; color: #2c2c2a; }

  .header { padding: 20px 24px 0; }
  h1 { font-size: 18px; font-weight: 500; }
  .subtitle { font-size: 13px; color: #888; margin-top: 4px; }

  /* Mode tabs */
  .tabs { display: flex; gap: 4px; padding: 16px 24px 0; border-bottom: 1px solid #e0e0de; }
  .tab {
    font-size: 13px; padding: 7px 18px; border-radius: 8px 8px 0 0;
    border: 1px solid transparent; border-bottom: none;
    background: transparent; color: #888; cursor: pointer; transition: all .15s;
    margin-bottom: -1px;
  }
  .tab.active {
    background: #f8f8f6; border-color: #e0e0de;
    color: #2c2c2a; font-weight: 500;
  }

  /* Strand filter buttons */
  .controls {
    display: flex; align-items: center;
    gap: 8px; flex-wrap: wrap; padding: 14px 24px 12px;
  }
  .strand-btn {
    font-size: 12px; padding: 5px 14px; border-radius: 20px;
    border: 1px solid #ccc; background: #fff;
    color: #555; cursor: pointer; transition: all .15s;
  }
  .strand-btn.active-all   { background: #444;     color: #fff; border-color: transparent; font-weight: 500; }
  .strand-btn.active-bio   { background: #1D9E75;  color: #fff; border-color: transparent; font-weight: 500; }
  .strand-btn.active-earth { background: #378ADD;  color: #fff; border-color: transparent; font-weight: 500; }
  .strand-btn.active-phys  { background: #BA7517;  color: #fff; border-color: transparent; font-weight: 500; }
  .strand-btn.active-chem  { background: #D85A30;  color: #fff; border-color: transparent; font-weight: 500; }
  .strand-btn.active-hend  { background: #7C5CBF;  color: #fff; border-color: transparent; font-weight: 500; }
  .strand-btn.active-inq   { background: #2A8FA8;  color: #fff; border-color: transparent; font-weight: 500; }

  .panel { display: none; }
  .panel.active { display: block; }

  #tree-wrap { overflow-x: auto; padding: 0 24px 32px; }
  svg { display: block; }

  #tooltip {
    position: fixed; pointer-events: none; opacity: 0; transition: opacity .15s;
    background: #fff; border: 1px solid #ddd; border-radius: 10px;
    padding: 12px 14px; max-width: 300px; z-index: 999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  #tooltip.show { opacity: 1; }
  #tt-code  { font-size: 11px; margin-bottom: 3px; font-weight: 600; }
  #tt-title { font-size: 13px; font-weight: 600; color: #222; margin-bottom: 6px; }
  #tt-goal  { font-size: 12px; color: #555; line-height: 1.55; }
</style>
</head>
<body>

<div class="header">
  <h1>Science Progression Map</h1>
  <p class="subtitle">ACARA v9 — Foundation to Year 10</p>
</div>

<div class="tabs">
  <button class="tab active" id="tab-concepts"     onclick="switchTab('concepts')">Concepts</button>
  <button class="tab"        id="tab-capabilities" onclick="switchTab('capabilities')">Capabilities</button>
</div>

<!-- Concepts panel -->
<div class="panel active" id="panel-concepts">
  <div class="controls" id="strand-controls-concepts"></div>
  <div id="tree-wrap"><svg id="tree-svg-concepts"></svg></div>
</div>

<!-- Capabilities panel -->
<div class="panel" id="panel-capabilities">
  <div class="controls" id="strand-controls-capabilities"></div>
  <div style="overflow-x:auto; padding: 0 24px 32px;">
    <svg id="tree-svg-capabilities"></svg>
  </div>
</div>

<div id="tooltip">
  <div id="tt-code"></div>
  <div id="tt-title"></div>
  <div id="tt-goal"></div>
</div>

<script>
  function switchTab(mode) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + mode).classList.add('active');
    document.getElementById('panel-' + mode).classList.add('active');
  }
</script>

<script src="render-concepts.js"></script>
<script src="render-capabilities.js"></script>

</body>
</html>
